name: Update profile stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: true

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Regenerate the stats block
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: uv run scripts/update_stats.py

      - name: Commit as a single, ever-amended bot commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "Stats unchanged today -- nothing to commit."
            exit 0
          fi

          git commit --amend -m "Updates stats" --reset-author --date=now
          git push --force-with-lease